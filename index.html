<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Parallax Project Tracking — manage projects, work orders, and field updates." />
  <title>Parallax Project Tracking</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img
          class="brand-logo"
          src="assets/parallax-logo.jpg"
          alt="Parallax Systems"
          width="120"
          height="83"
        />
        <div>
          <strong>Parallax Systems</strong>
          <span>Project Tracking</span>
        </div>
      </div>
      <div class="topbar-actions">
        <input type="search" id="search" placeholder="Search projects, address, WO…" aria-label="Search" />
        <select id="filter-status" aria-label="Filter by status">
          <option value="">All statuses</option>
          <option>Not Yet Started</option>
          <option>In Progress</option>
          <option>Scheduled</option>
          <option>On Hold</option>
          <option>Waiting on other</option>
          <option>Port Submitted</option>
          <option>Parts Ordered</option>
          <option>Needs Quoted</option>
          <option>Ready for Billing</option>
          <option>Billing Complete</option>
          <option>Complete</option>
          <option>Disregard</option>
        </select>
        <select id="filter-user" aria-label="Filter by user">
          <option value="">All users</option>
          <option>Dexter</option>
          <option>Ben</option>
          <option>Jason</option>
          <option>Cooper</option>
          <option>Everyone</option>
          <option>Mike</option>
          <option>Ben/Dexter</option>
          <option>Mike &amp; Cooper</option>
          <option>Dexter/Cooper</option>
          <option>Kyler</option>
          <option>Dexter/Kyler</option>
          <option>Ben/Dexter/Kyler</option>
        </select>
        <button type="button" class="btn btn-ghost" id="btn-hide-complete" aria-pressed="false" title="Hide jobs with status Complete or Billing Complete">
          Hide completed
        </button>
        <button type="button" class="btn btn-ghost" id="btn-export" title="Export CSV">Export</button>
        <button type="button" class="btn btn-primary" id="btn-new">+ New project</button>
      </div>
    </header>

    <main class="main">
      <div class="stats" id="stats"></div>

      <div class="table-wrap">
        <table class="data-table" id="projects-table">
          <thead>
            <tr>
              <th data-sort="user">Assigned</th>
              <th data-sort="openDate">Open Date</th>
              <th data-sort="project">Project</th>
            </tr>
          </thead>
          <tbody id="projects-body"></tbody>
        </table>
        <p class="empty" id="empty-state" hidden>No projects yet. Click <strong>New project</strong> to add one.</p>
      </div>
    </main>
  </div>

  <!-- Delete password modal -->
  <div class="modal-backdrop" id="password-modal" hidden>
    <div class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="password-title">
      <header class="modal-header">
        <h2 id="password-title">Delete requires password</h2>
        <button type="button" class="icon-btn" id="password-close" aria-label="Close">&times;</button>
      </header>
      <form id="password-form" class="modal-body">
        <p class="password-hint">Anyone can view and edit jobs. A password is required to delete.</p>
        <label>
          Password
          <input type="password" id="delete-password" autocomplete="current-password" required />
        </label>
        <p class="password-error" id="password-error" hidden>Incorrect password.</p>
        <label class="checkbox-row">
          <input type="checkbox" id="password-remember" checked />
          Remember for this browser session
        </label>
        <footer class="modal-footer">
          <button type="button" class="btn btn-ghost" id="password-cancel">Cancel</button>
          <button type="submit" class="btn btn-danger">Delete job</button>
        </footer>
      </form>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-header">
        <h2 id="modal-title">New project</h2>
        <button type="button" class="icon-btn" id="btn-close" aria-label="Close">&times;</button>
      </header>
      <form id="project-form" class="modal-body">
        <input type="hidden" id="field-id" name="id" />

        <div class="form-grid">
          <label>
            Open Date
            <input type="date" id="field-openDate" name="openDate" />
          </label>
          <label>
            Completed Date
            <input type="date" id="field-completedDate" name="completedDate" />
          </label>
          <label class="span-2">
            Project
            <input type="text" id="field-project" name="project" required placeholder="Project name" />
          </label>
          <label class="span-2">
            Address
            <input type="text" id="field-address" name="address" placeholder="Job site address" />
          </label>
          <label class="span-2">
            Update
            <input type="text" id="field-update" name="update" placeholder="Latest update" />
          </label>
          <label>
            Scheduled
            <input type="date" id="field-scheduled" name="scheduled" />
          </label>
          <label>
            Status
            <select id="field-status" name="status">
              <option value="Not Yet Started">Not Yet Started</option>
              <option value="In Progress">In Progress</option>
              <option value="Scheduled">Scheduled</option>
              <option value="On Hold">On Hold</option>
              <option value="Waiting on other">Waiting on other</option>
              <option value="Port Submitted">Port Submitted</option>
              <option value="Parts Ordered">Parts Ordered</option>
              <option value="Needs Quoted">Needs Quoted</option>
              <option value="Ready for Billing">Ready for Billing</option>
              <option value="Billing Complete">Billing Complete</option>
              <option value="Complete">Complete</option>
              <option value="Disregard">Disregard</option>
            </select>
          </label>
          <label>
            User
            <select id="field-user" name="user">
              <option value="">— Select user —</option>
              <option value="Dexter">Dexter</option>
              <option value="Ben">Ben</option>
              <option value="Jason">Jason</option>
              <option value="Cooper">Cooper</option>
              <option value="Everyone">Everyone</option>
              <option value="Mike">Mike</option>
              <option value="Ben/Dexter">Ben/Dexter</option>
              <option value="Mike &amp; Cooper">Mike &amp; Cooper</option>
              <option value="Dexter/Cooper">Dexter/Cooper</option>
              <option value="Kyler">Kyler</option>
              <option value="Dexter/Kyler">Dexter/Kyler</option>
              <option value="Ben/Dexter/Kyler">Ben/Dexter/Kyler</option>
            </select>
          </label>
          <label>
            WO
            <input type="text" id="field-wo" name="wo" placeholder="Work order #" />
          </label>
          <label>
            NRC
            <input type="text" id="field-nrc" name="nrc" placeholder="Non-recurring charge" />
          </label>
          <label>
            MRC
            <input type="text" id="field-mrc" name="mrc" placeholder="Monthly recurring charge" />
          </label>
          <label class="span-2">
            Contact
            <input type="text" id="field-contact" name="contact" placeholder="Name, phone, or email" />
          </label>
          <label class="span-2">
            Notes
            <textarea id="field-notes" name="notes" rows="3" placeholder="Additional notes"></textarea>
          </label>
        </div>

        <footer class="modal-footer">
          <button type="button" class="btn btn-ghost" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save project</button>
        </footer>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
